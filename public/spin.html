<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spin Wheel Game - ZHU Web3</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 1.5rem auto;
    }
    #wheel-canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid var(--border-dark);
      box-shadow: var(--shadow-lg);
      transition: transform 4s cubic-bezier(0.15, 0.9, 0.15, 1);
    }
    .wheel-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 24px solid var(--danger);
      z-index: 10;
    }
    .center-cap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      background: #ffffff;
      border: 3px solid var(--border-dark);
      border-radius: 50%;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="main-content">
      <div class="container" style="max-width: 700px; text-align: center;">
        <h2>Wheel of Fortune</h2>
        <p class="text-secondary">Spin using Points or ZHU tokens to win instant prizes up to a 20 ZHU Jackpot.</p>

        <div class="card" style="margin-top: 1.5rem; padding: 2rem;">
          <div id="error-alert" class="alert alert-error" style="display: none;"></div>

          <!-- Currency Mode Selector -->
          <div style="max-width: 380px; margin: 0 auto 1.25rem auto;">
            <div style="display: flex; gap: 0.75rem;">
              <button type="button" id="spin-curr-points" class="btn" style="flex: 1; padding: 0.55rem;">Points (100 PTS)</button>
              <button type="button" id="spin-curr-zhu" class="btn btn-secondary" style="flex: 1; padding: 0.55rem;">ZHU Token (1.0 ZHU)</button>
            </div>
          </div>

          <div style="font-size: 0.95rem; margin-bottom: 0.5rem; font-weight: 600;">
            Spin Cost: <strong id="cost-display" style="color: var(--primary-blue);">100 Points</strong>
          </div>

          <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="400" height="400"></canvas>
            <div class="center-cap">ZHU</div>
          </div>

          <button type="button" id="spin-btn" class="btn" style="padding: 0.85rem 2.5rem; font-size: 1.1rem;">
            Spin Wheel Now ➔
          </button>

          <div id="spin-result-box" style="margin-top: 1.25rem; font-size: 1.1rem; font-weight: 700; min-height: 36px;">
            Spin to reveal your prize
          </div>
        </div>

        <!-- History Table -->
        <div class="card" style="margin-top: 1.75rem; text-align: left;">
          <h3>Recent Wheel Spins</h3>
          <div class="table-container" style="margin-top: 1rem;">
            <table class="table">
              <thead>
                <tr>
                  <th>Prize</th>
                  <th>Cost</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="spin-history-body">
                <tr><td colspan="3" style="text-align:center; color: var(--text-secondary);">No spins yet</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/spin.js"></script>
</body>
</html>
