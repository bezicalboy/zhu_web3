<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign In - ZHU Web3</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="auth-logo">
        <span class="text-gradient">ZHU</span>
      </div>
      <h2>Sign In</h2>
      <p class="text-secondary" style="margin-bottom: 1.75rem; font-size: 0.9rem;">Access your custodial ZHU wallet & gaming portal</p>
      
      <div id="error-alert" class="alert alert-error" style="display: none;"></div>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="input-control" required placeholder="name@company.com">
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;" id="login-btn">
          Sign In ➔
        </button>
      </form>
      
      <div style="margin-top: 1.5rem; font-size: 0.875rem; text-align: center; border-top: 1px solid var(--border-slate); padding-top: 1.25rem;">
        <span class="text-secondary">Don't have an account?</span>
        <a href="/register.html" style="font-weight: 700;">Create Account</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
