<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Account - ZHU Web3</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div class="auth-logo">
        <span class="text-gradient">ZHU</span>
      </div>
      <h2>Create Account</h2>
      <p class="text-secondary" style="margin-bottom: 1.75rem; font-size: 0.9rem;">Setup your custodial ZHU wallet & claim +100 bonus points</p>
      
      <div id="error-alert" class="alert alert-error" style="display: none;"></div>
      
      <form id="register-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="input-control" required placeholder="name@company.com">
        </div>
        
        <div class="input-group">
          <label for="password">Password (min 8 characters)</label>
          <input type="password" id="password" class="input-control" required placeholder="••••••••">
        </div>
        
        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="input-control" required placeholder="••••••••">
        </div>

        <div class="input-group">
          <label for="referral-code">Referral Code (Optional)</label>
          <input type="text" id="referral-code" class="input-control" placeholder="e.g. AB12CD34" style="text-transform: uppercase;">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;" id="register-btn">
          Create Account & Claim Bonus ➔
        </button>
      </form>
      
      <div style="margin-top: 1.5rem; font-size: 0.875rem; text-align: center; border-top: 1px solid var(--border-slate); padding-top: 1.25rem;">
        <span class="text-secondary">Already have an account?</span>
        <a href="/index.html" style="font-weight: 700;">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
