<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>History - ZHU Web3</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .filter-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }
    .filter-tab {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .filter-tab:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.05);
    }
    .filter-tab.active {
      color: var(--primary-teal);
      background: rgba(0, 212, 170, 0.1);
    }
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="main-content">
      <div class="container">
        <h2>Transaction History</h2>
        
        <div class="card" style="margin-top: 1.5rem;">
          <div class="filter-tabs">
            <button class="filter-tab active" data-type="all">All</button>
            <button class="filter-tab" data-type="deposits">Deposits</button>
            <button class="filter-tab" data-type="withdrawals">Withdrawals</button>
          </div>
          
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Tx Hash</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="history-body">
                <tr><td colspan="5" class="skeleton" style="height: 40px; margin-bottom: 10px;"></td></tr>
                <tr><td colspan="5" class="skeleton" style="height: 40px; margin-bottom: 10px;"></td></tr>
                <tr><td colspan="5" class="skeleton" style="height: 40px; margin-bottom: 10px;"></td></tr>
              </tbody>
            </table>
          </div>
          
          <div class="pagination">
            <button id="prev-page" class="btn btn-secondary" disabled>Previous</button>
            <span class="text-secondary">Page <span id="current-page">1</span></span>
            <button id="next-page" class="btn btn-secondary" disabled>Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
